name: lint

on:
  pull_request:
    paths:
      - "supervisor/**"
      - ".golangci.yml"
      - ".github/workflows/lint.yml"
  push:
    branches: [main]
    paths:
      - "supervisor/**"
      - ".golangci.yml"
      - ".github/workflows/lint.yml"

permissions:
  contents: read

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache-dependency-path: supervisor/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: supervisor
