name: security

on:
  pull_request:
    paths:
      - "supervisor/**"
      - ".github/workflows/security.yml"
  push:
    branches: [main]
    paths:
      - "supervisor/**"
      - ".github/workflows/security.yml"
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: supervisor/go.mod
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: supervisor/go.mod
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.1
      - run: gosec ./...
