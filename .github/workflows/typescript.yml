name: TypeScript

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/typescript.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/typescript.yml"

permissions:
  contents: read

concurrency:
  group: typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Worker checks
    runs-on: ubuntu-latest
    env:
      GITHUB_WEBHOOK_SECRET: ci-placeholder
      GITHUB_APP_ID: ci-placeholder
      GITHUB_APP_PRIVATE_KEY: ci-placeholder
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Cloudflare types
        run: pnpm types
      - name: Check generated types
        run: git diff --exit-code -- worker-configuration.d.ts
      - name: Typecheck
        run: pnpm typecheck
      - name: Check formatting
        run: pnpm fmt:check
      - name: Lint
        run: pnpm lint
      - name: Check unused code
        run: pnpm knip
      - name: Test
        run: pnpm test
