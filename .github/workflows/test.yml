name: test

on:
  pull_request:
    paths:
      - "supervisor/**"
      - ".github/workflows/test.yml"
  push:
    branches: [main]
    paths:
      - "supervisor/**"
      - ".github/workflows/test.yml"

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supervisor
    strategy:
      fail-fast: false
      matrix:
        go: ['1.26.x', 'stable']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: supervisor/go.mod
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go mod verify
      - run: go test -race -shuffle=on -coverprofile=coverage.out ./...
