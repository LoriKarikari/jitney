name: TypeScript

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/typescript.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/typescript.yml"

permissions:
  contents: read

concurrency:
  group: typescript-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Generated types
            command: pnpm types && git diff --exit-code -- worker-configuration.d.ts
          - name: Typecheck
            command: pnpm typecheck
          - name: Formatting
            command: pnpm fmt:check
          - name: Oxlint
            command: pnpm lint
          - name: Knip
            command: pnpm knip
          - name: Worker tests
            command: pnpm test
    env:
      GITHUB_WEBHOOK_SECRET: ci-placeholder
      GITHUB_APP_ID: ci-placeholder
      GITHUB_APP_PRIVATE_KEY: ci-placeholder
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: ${{ matrix.command }}
