name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish_cli:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
      - uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: |
            cli/pnpm-lock.yaml
            worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: worker
      - run: pnpm install --frozen-lockfile
        working-directory: cli
      - run: pnpm check
        working-directory: cli
      - name: Pack the tested CLI
        run: npm pack --ignore-scripts --pack-destination "$RUNNER_TEMP"
        working-directory: cli
      - name: Publish with trusted publishing
        run: npm publish "$RUNNER_TEMP/get-jitney-${{ needs.release_please.outputs.version }}.tgz" --ignore-scripts --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""

  publish_runner_image:
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: runner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/lorikarikari/jitney:${{ needs.release_please.outputs.version }}
            ghcr.io/lorikarikari/jitney:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
