version: 2
updates:
  - package-ecosystem: gomod
    directory: /supervisor
    schedule:
      interval: weekly
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
    ignore:
      # Alchemy v2 and Effect 4 are pre-GA and must be upgraded together.
      - dependency-name: effect
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
